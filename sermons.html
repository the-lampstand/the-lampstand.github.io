<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sermons — The Lampstand</title>
<meta name="description" content="Browse family sermons by month or theme." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,500;0,600;0,700;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body data-page="sermons">
<a href="#main" class="skip-link">Skip to main content</a>

<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="index.html">
      <svg class="lamp-icon" viewBox="0 0 48 48" fill="none" aria-hidden="true">
        <path class="flame-glow" d="M24 6C20 12 17 15 17 20a7 7 0 0 0 14 0c0-5-3-8-7-14Z" fill="url(#flameGrad2)"/>
        <path d="M12 30h24l-3 6H15l-3-6Z" stroke="#7cc0ff" stroke-width="2" stroke-linejoin="round"/>
        <path d="M24 36v6M17 42h14" stroke="#6fe0a0" stroke-width="2" stroke-linecap="round"/>
        <defs>
          <linearGradient id="flameGrad2" x1="17" y1="6" x2="24" y2="27" gradientUnits="userSpaceOnUse">
            <stop stop-color="#7cc0ff"/>
            <stop offset="1" stop-color="#6fe0a0"/>
          </linearGradient>
        </defs>
      </svg>
      <span>
        <span class="brand-name">The Lampstand</span>
        <span class="brand-tagline">Family sermons &amp; reflections</span>
      </span>
    </a>

    <button class="nav-toggle" aria-expanded="false" aria-controls="site-nav">
      <span class="visually-hidden">Toggle menu</span>
      ☰ Menu
    </button>

    <nav class="site-nav" id="site-nav" aria-label="Main">
      <a href="index.html">Home</a>
      <a href="sermons.html" aria-current="page">Sermons</a>
      <a href="questions.html">Monthly Questions</a>
      <a href="contact.html">Contact</a>
      <div class="text-size-control" role="group" aria-label="Adjust text size">
        <button type="button" data-font-dec aria-label="Decrease text size">A−</button>
        <button type="button" data-font-reset aria-label="Reset text size">A</button>
        <button type="button" data-font-inc aria-label="Increase text size">A+</button>
      </div>
    </nav>
  </div>
</header>

<main id="main">
  <div class="wrap">
    <section style="padding-top:2.5rem;">
      <p class="eyebrow">Archive</p>
      <h1 class="section-heading">Sermons</h1>
      <p class="section-sub">Browse every sermon posted, filter by month or theme, or click a title to read the full reflection.</p>

      <div id="sermon-detail" hidden class="sermon-detail"></div>

      <form class="filters" onsubmit="return false;">
        <div class="field">
          <label for="filter-month">Month</label>
          <select id="filter-month">
            <option value="">All months</option>
          </select>
        </div>
        <div class="field">
          <label for="filter-theme">Theme</label>
          <select id="filter-theme">
            <option value="">All themes</option>
          </select>
        </div>
        <button type="button" id="filter-clear" class="btn btn-outline">Clear filters</button>
      </form>

      <p id="result-count" class="result-count"></p>

      <div id="sermon-list" class="card-list"></div>
    </section>
  </div>
</main>

<footer class="site-footer">
  <div class="wrap">
    <p>The Lampstand — kept for our family.</p>
    <p><a href="contact.html">Get in touch</a></p>
  </div>
</footer>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
